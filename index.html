<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
    <title>Home</title>
</head>
<body>

    <h2>English(US)</h2>
    <div class="image"><img src="images/logo.png" alt="" class="logo"></div>

    
    
    <form id="loginForm">

        <div class="form">
            <input type="text" name="username" id="username" placeholder="Username, email or mobile number">
            <input type="password" id="password" name="password" placeholder="Password">
            <button type="submit" class="login-btn" id="submitBtn">Log in</button>
            <a href="#">Forgot password?</a>
        </div>
    </form>

    <div class="meta-div">
        <button class="account">Create new account</button>
        <img src="images/metalogo.png" alt="" class="meta">
    </div>







    <script src="script.js"></script>
    
</body>
</html>
